<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>농구 2심제 연습기 v0.20</title>
    <style>
        /* 기본 스타일 및 레이아웃 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: #f2f2f2; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 800px; background: #ffffff; border: 1px solid #999; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .header h1 { margin: 0; font-size: 1.6rem; color: #333; }
        .version { color: #888; font-size: 0.9rem; margin-bottom: 4px; }

        .tabs { display: flex; background: #e0e0e0; border-bottom: 1px solid #999; }
        .tab-btn { flex: 1; padding: 15px; border: 1px solid #bbb; background: #d0d0d0; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .tab-btn.active { background: #ffffff; border-bottom: none; border-top: 3px solid #333; color: #000; }

        .badge-row { display: flex; gap: 8px; padding: 15px 20px; background: #fff; flex-wrap: wrap; }
        .badge { padding: 6px 12px; font-weight: bold; font-size: 0.9rem; border-radius: 3px; border: 1px solid #ccc; }
        .bg-gray { background: #666; color: #fff; border: none; }
        .dynamic-badge { flex-grow: 1; text-align: center; border: 0.5px solid #000 }

        /* 메인 콘텐츠 그리드 (PC 기본) */
        .content-box { display: grid; grid-template-columns: 80px 1fr 160px; gap: 15px; padding: 20px; border-top: 1px solid #eee; min-height: 140px; }
        .side-label { display: flex; align-items: center; justify-content: center; text-align: center; color: white; font-weight: bold; border-radius: 5px; font-size: 1.1rem; line-height: 1.3; }
        .label-orange { background: #f39c12; }
        .label-green { background: #27ae60; }

        .text-display { font-size: 1.15rem; line-height: 1.6; font-weight: bold; color: #222; display: flex; align-items: center; }
        .guide-text { font-weight: normal; color: #444; white-space: pre-line; }

        .btn-wrap { display: flex; align-items: center; justify-content: center; }
        .push-btn { 
            width: 100%; padding: 15px 5px; font-size: 1.05rem; font-weight: bold; border: 2px solid #333; 
            background: #fff; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #333; position: relative; top: 0;
        }
        .push-btn:active { top: 3px; box-shadow: 0 1px 0 #333; }
        .divider { height: 1px; background: #eee; margin: 0 20px; }

        /* [모바일 대응 미디어 쿼리] */
        @media (max-width: 600px) {
            body { padding: 5px; }
            .header { padding: 10px 15px; }
            .header h1 { font-size: 1.1rem; }
            .tab-btn { padding: 10px 5px; font-size: 0.85rem; }
            .badge-row { padding: 10px; gap: 5px; }
            .badge { font-size: 0.75rem; padding: 4px 6px; }
            
            /* 가독성 핵심: 중앙 텍스트(1fr)를 위해 양옆 너비 축소 */
            .content-box { 
                grid-template-columns: 55px 1fr 95px; 
                gap: 8px; 
                padding: 12px 8px; 
                min-height: 120px;
            }
            .side-label { width: 45px; font-size: 0.8rem; height: 55px; border-radius: 4px; }
            .text-display { font-size: 0.9rem; line-height: 1.4; }
            .push-btn { font-size: 0.8rem; padding: 10px 2px; border-radius: 6px; box-shadow: 0 3px 0 #333; }
            .divider { margin: 0 10px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>농구 2심제 연습기</h1>
        <div class="version">v0.20 by Minuke</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-LEAD">LEAD</button>
        <button class="tab-btn" id="tab-TRAIL">TRAIL</button>
        <button class="tab-btn" id="tab-ALL">ALL</button>
    </div>

    <div class="badge-row">
        <div id="info-pos" class="badge bg-gray">리드 포지션</div>
		<div id="info-quarter" class="badge bg-gray">1Q: 자기벤치로 공격</div>
		<div id="info-court" class="badge bg-gray">코트: 로딩중</div>
		<div id="info-def" class="badge dynamic-badge">수비팀: 로딩중</div>
		<div id="info-off" class="badge dynamic-badge">공격팀: 로딩중</div>

    </div>

    <div class="content-box">
        <div class="side-label label-orange">상 황</div>
        <div id="display-situation" class="text-display">데이터 로딩 중...</div>
        <div class="btn-wrap">
            <button class="push-btn" id="btn-next">생 성</button>
        </div>
    </div>

    <div class="divider"></div>

    <div class="content-box">
        <div class="side-label label-green">대 응</div>
        <div id="display-guide" class="text-display guide-text">버튼을 눌러 확인하세요!</div>
        <div class="btn-wrap">
            <button class="push-btn" id="btn-guide">확 인</button>
        </div>
    </div>
</div>

<script>
    const colorMap = {
        "블랙": { bg: "#000000", text: "#ffffff" },
        "화잍": { bg: "#ffffff", text: "#000000" },
        "블루": { bg: "#2980b9", text: "#ffffff" },
        "레드": { bg: "#c0392b", text: "#ffffff" },
        "그린": { bg: "#27ae60", text: "#ffffff" },
        "옐로": { bg: "#f1c40f", text: "#000000" },
        "퍼플": { bg: "#8e44ad", text: "#ffffff" },
    };

    const quarters = ["1Q", "2Q", "3Q", "4Q", "연장"];
    const teams = Object.keys(colorMap);
    const fouls = ["해킹", "푸싱", "블락", "홀딩", "핸드체킹"];

    const scenarios = {
        LEAD: [
            { area: '4번 구역', act: '점프슛', f: '해킹', res: '슛 실패.', g: '휘슬+주먹>"투샷!"+두손가락\n테이블 쪽>"{def}/{num}번/{foul}/투샷"\n스위치>프리드로(트레일 롤)' },
            { area: '5번 구역', act: '레이업슛', f: '푸싱', res: '슛 성공.', g: '휘슬+주먹>"투카운트, 원샷"+시그널\n테이블 쪽>"{def}/{num}번/{foul}/원샷"\n스위치>프리드로(트레일 롤)' },
            { area: '4번 구역', act: '포스트업', f: '블락', res: '파울!', g: '휘슬+주먹>"{off} 볼!"+공격방향 지시\n테이블 쪽>"{def}/{num}번/{foul}/{off}볼"\n스위치>니어라인 드로인' },
            { area: '4번 구역', res: '{def} 아웃오브바운드!', g: '휘슬+손바닥>"{off} 볼!"+공격방향 지시\n아웃라인 드로인(휘슬)>헨딩 후 5초 카운트\n패스 시 찹시그널' },
            { area: '5번 구역', res: '{off} 아웃오브바운드!', g: '휘슬+손바닥>"{def} 볼!"+반대코트 지시\n아웃라인 드로인 지정\n핸딩 후 패스 시 찹시그널' }
        ],
        TRAIL: [
            { area: '1번 구역', act: '3점슛', f: '해킹', res: '슛 실패.', g: '휘슬+주먹>"쓰리샷!"+세손가락\n테이블 쪽 > "{def}/{num}번/{foul}/쓰리샷"\n스위치>프리드로(리드 롤)' },
            { area: '2번 구역', act: '드리블', f: '핸드체킹', res: '파울!', g: '휘슬+주먹>"{off} 볼"+공격방향 지시\n테이블 쪽>"{def}/{num}번/{foul}/{off}볼"\n스위치>니어라인 드로인' },
            { area: '3번 구역', res: '{def} 아웃오브바운드!', g: '휘슬+손바닥>"{off} 볼!"+공격방향 지시\n아웃라인 드로인(휘슬)>헨딩 후 5카운트\n패스 시 찹시그널' },
            { area: '6번 구역', act: '점프슛', f: '홀딩', res: '슛 성공.', g: '휘슬+주먹>"투카운트, 원샷"+시그널\n테이블 쪽>"{def}/{num}번/{foul}/원샷"\n스위치>프리드로(리드 롤)' },
            { area: '2번 구역', res: '{off} 아웃오브바운드!', g: '휘슬+손바닥>"{def} 볼!"+반대코트 지시\n아웃라인 드로인 지정\n핸딩 후 패스 시 찹시그널' }
        ]
    };

    let currentMode = 'LEAD';
    let currentGuide = "";

    function updateBadge(id, teamName, prefix) {
        const el = document.getElementById(id);
        const colors = colorMap[teamName];
        el.innerText = `${prefix}: ${teamName}`;
        el.style.backgroundColor = colors.bg;
        el.style.color = colors.text;
    }

    function generate() {
        document.getElementById('display-guide').innerText = "버튼을 눌러 확인하세요.";
        const q = quarters[Math.floor(Math.random() * quarters.length)];
        const isL = (currentMode === 'ALL') ? (Math.random() > 0.5) : (currentMode === 'LEAD');
        const c1 = Math.floor(Math.random() * teams.length);
        let c2 = (c1 + 1) % teams.length;
        const offT = teams[c1];
        const defT = teams[c2];
        const bench = (q.includes("1Q") || q.includes("2Q")) ? offT : defT;
        const pNum = Math.floor(Math.random() * 99) + 1;
        const fType = fouls[Math.floor(Math.random() * fouls.length)];

        document.getElementById('info-pos').innerText = isL ? "리 드" : "트레일";
		updateBadge('info-off', offT, '공격');
        updateBadge('info-def', defT, '수비');
        document.getElementById('info-quarter').innerText = q;
        document.getElementById('info-court').innerText = `${bench} 코트`;

        const pool = isL ? scenarios.LEAD : scenarios.TRAIL;
        const s = pool[Math.floor(Math.random() * pool.length)];
        const posLabel = isL ? "리드" : "트레일";

        let sitHtml = "";
        if (s.act) {
            sitHtml = `${s.area} ${offT} ${s.act},<br>${defT} ${pNum}번 ${fType}, ${s.res}`;
        } else {
            const resClean = s.res.replace('{def}', defT).replace('{off}', offT);
            sitHtml = `${s.area} 라인 경합!<br>${resClean}`;
        }
        document.getElementById('display-situation').innerHTML = sitHtml;
        currentGuide = s.g.replace(/{def}/g, defT).replace(/{off}/g, offT).replace(/{num}/g, pNum).replace(/{foul}/g, fType);
    }

    window.onload = function() {
        document.getElementById('btn-next').addEventListener('click', generate);
        document.getElementById('btn-guide').addEventListener('click', function() {
            document.getElementById('display-guide').innerText = currentGuide;
        });

        const modes = ['LEAD', 'TRAIL', 'ALL'];
        modes.forEach(m => {
            document.getElementById(`tab-${m}`).addEventListener('click', function() {
                currentMode = m;
                modes.forEach(id => document.getElementById(`tab-${id}`).classList.remove('active'));
                this.classList.add('active');
                generate();
            });
        });

        generate();
    };
</script>

</body>
</html>
