<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏀농구 심판 기초 콜 v0.20</title>
    <style>
        /* 기본 스타일 및 레이아웃 */
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: #f2f2f2; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 800px; background: #ffffff; border: 1px solid #999; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: flex-end; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .header h1 { margin: 0; font-size: 1.6rem; color: #333; }
        .version { color: #888; font-size: 0.9rem; margin-bottom: 4px; }

        .tabs { display: flex; background: #e0e0e0; border-bottom: 1px solid #999; }
        .tab-btn { flex: 1; padding: 15px; border: 1px solid #bbb; background: #d0d0d0; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .tab-btn.active { background: #ffffff; border-bottom: none; border-top: 3px solid #333; color: #000; }

        .badge-row { display: flex; gap: 8px; padding: 15px 20px; background: #fff; flex-wrap: wrap; }
        .badge { padding: 6px 12px; font-weight: bold; font-size: 0.9rem; border-radius: 3px; border: 1px solid #ccc; }
        .bg-gray { background: #666; color: #fff; border: none; }
        .dynamic-badge { flex-grow: 1; text-align: center; border: 0.5px solid #000 }

        /* 메인 콘텐츠 그리드 (PC 기본) */
        .content-box { display: grid; grid-template-columns: 80px 1fr 160px; gap: 15px; padding: 20px; border-top: 1px solid #eee; min-height: 140px; }
        .side-label { display: flex; align-items: center; justify-content: center; text-align: center; color: white; font-weight: bold; border-radius: 5px; font-size: 1.1rem; line-height: 1.3; }
        .label-orange { background: #f39c12; }
        .label-green { background: #27ae60; }

        .text-display { font-size: 1.10rem; line-height: 1.6; font-weight: bold; color: #222; display: flex; align-items: center; }
        .guide-text { font-size: 1.10rem; color: #c0392b; white-space: pre-line; }

        .btn-wrap { display: flex; align-items: center; justify-content: center; }
        .push-btn { 
            width: 100%; padding: 15px 5px; font-size: 1.05rem; font-weight: bold; border: 2px solid #333; 
            background: #fff; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #333; position: relative; top: 0;
        }
        .push-btn:active { top: 3px; box-shadow: 0 1px 0 #333; }
        .divider { height: 1px; background: #eee; margin: 0 20px; }

        /* [모바일 대응 미디어 쿼리] */
        @media (max-width: 600px) {
            body { padding: 5px; }
            .header { padding: 20px 15px; }
            .header h1 { font-size: 1.1rem; }
            .tab-btn { padding: 10px 5px; font-size: 0.85rem; }
            .badge-row { padding: 12px; gap: 12px; }
            .badge { font-size: 0.8rem; padding: 5px 6px; }
            
            /* 가독성 핵심: 중앙 텍스트(1fr)를 위해 양옆 너비 축소 */
            .content-box { 
                grid-template-columns: 44px 1fr 0px; 
                gap: 10px; 
                padding: 20px 10px; 
                min-height: 120px;
            }
            .side-label { width: 30px; font-size: 0.8rem; height: 150px; border-radius: 4px; }
            .text-display { font-size: 1.0rem; line-height: 1.5; }
            .push-btn { font-size: 0.9rem; padding: 18px 0px; border-radius: 6px; box-shadow: 0 3px 0 #333; }
            .divider { margin: 0 0px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>🏀농구 2심제 콜연습</h1>
        <div class="version">v0.20 by Minuke</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-LEAD">LEAD</button>
        <button class="tab-btn" id="tab-TRAIL">TRAIL</button>
        <button class="tab-btn" id="tab-ALL">ALL</button>
    </div>

    <div class="badge-row">
        <div id="info-pos" class="badge bg-gray">리드 포지션</div>
		<div id="info-off" class="badge dynamic-badge">공격팀: 로딩중</div>
		<div id="info-def" class="badge dynamic-badge">수비팀: 로딩중</div>
    </div>

    <div class="content-box">

		<div class="btn-wrap">
            <button class="push-btn" id="btn-next">상황</button>
        </div>
        <div id="display-situation" class="text-display">데이터 로딩 중...</div>

    </div>

    <div class="divider"></div>

    <div class="content-box">
	        <div class="btn-wrap">
            <button class="push-btn" id="btn-guide">대응</button>
        </div>
        <div id="display-guide" class="text-display guide-text">버튼을 눌러 확인하세요!</div>

    </div>
</div>

<script>
const colorMap = {
    "블랙": { bg: "#000000", text: "#ffffff" },
    "화이트": { bg: "#ffffff", text: "#000000" },
    "블루": { bg: "#2980b9", text: "#ffffff" },
    "레드": { bg: "#ff3503", text: "#ffffff" },
    "그린": { bg: "#27ae60", text: "#ffffff" },
    "옐로": { bg: "#efff00", text: "#000000" },
    "퍼플": { bg: "#8e44ad", text: "#ffffff" },
};

const quarters = ["골인", "노골"];
const teams = Object.keys(colorMap);
const fouls = ["히팅", "푸싱", "블락", "홀딩"];

const scenarios = {
    LEAD: [
        { area: '4번 구역 숏코너', act: '미들슛', f: '히팅', res: '(노골)', g: '삑!주먹 "2샷" \n "{def}{num}번 {foul}, 2샷"' },
        { area: '5번 구역 페인트존', act: '골밑슛', f: '블락', res: '(골인)', g: '삑!주먹 "2카운트1샷" \n "{def}{num}번 {foul}, 1샷"' },
        { area: '4번 구역 코너', act: '3점슛', f: '히팅', res: '(노골)', g: '삑!주먹 "3샷" \n "{def}{num}번 {foul}, 3샷"' },
        { area: '5번 구역 드라이브인', act: '레이업', f: '블락', res: '(노골)', g: '삑!주먹 "2샷" \n "{def}{num}번 {foul}, 2샷"' },
        { area: '4번 구역 베이스라인', act: '드리블', f: '푸싱', res: '', g: '삑!주먹 "{off}볼" 공격방향 \n "{def}{num}번 {foul}, {off}볼 베이스"' },
        { area: '5번 구역 페인트존', act: '포스트업', f: '푸싱', res: '', g: '삑!주먹 "{off}볼" 공격방향 \n "{def}{num}번 {foul}, {off}볼 베이스"' },
        { area: '5번 구역 드라이브인', f: '차징', res: '레이업 차징', g: '삑!주먹 "{def}볼" 반대방향 주먹\n "{off}{num}번 차징, {def}볼 베이스"' },
        { area: '4번 구역 베이스라인', res: '트래블', g: '삑!손 "트래블, {def}볼" 반대방향\n "베이스" 드로인 위치 손' },
        { area: '5번 구역 페인트존', res: '3초', g: '삑!손 "3초, {def}볼" 반대방향\n "베이스" 드로인 위치 손' },
        { area: '4번 구역 사이드라인', res: '{off} 아웃', g: '삑!손 "{def}볼" 반대방향\n "사이드" 드로인 위치 손' },
        { area: '5번 구역 베이스라인', res: '{def} 아웃', g: '삑!손 "{off}볼" 공격방향\n "베이스" 드로인 위치 손' },
        { area: '5번 구역 베이스라인', res: '{off} 아웃', g: '삑!손 "{def}볼" 반대방향\n "베이스" 드로인 위치 손' }
    ],
    TRAIL: [
        { area: '2번 구역 네일에서', act: '미들슛', f: '히팅', res: '(노골)', g: '삑!주먹 "2샷" \n "{def} {num}번 {foul}, 2샷"' },
        { area: '6번 구역 숏코너', act: '플로터', f: '블락', res: '(골인)', g: '삑!주먹 "2카운트1샷" \n "{def} {num}번 {foul}, 1샷"' },
        { area: '3번 구역 윙에서', act: '3점슛', f: '히팅', res: '(노골)', g: '삑!주먹 "3샷" \n "{def} {num}번 {foul}, 3샷"' },
        { area: '1번 구역 윙에서', act: '3점슛', f: '히팅', res: '(골인)', g: '삑!주먹 "3카운트1샷" \n "{def} {num}번 {foul}, 1샷"' },
        { area: '2번 구역 탑에서', act: '드리블', f: '푸싱', res: '', g: '삑!주먹 "{off}볼" 공격방향 \n "{def} {num}번 {foul}, {off}볼 사이드"' },
        { area: '1번 구역 윙에서', act: '드리블', f: '푸싱', res: '', g: '삑!주먹 "{off}볼" 공격방향 \n "{def} {num}번 {foul}, {off}볼 사이드"' },
        { area: '3번 구역 윙에서', f: '차징', res: '스크린 오펜스 파울', g: '삑!주먹 "{def}볼" 주먹방향 \n "{off} {num}번 차징, {def}볼 사이드"' },
        { area: '2번 구역 탑에서', res: '트래블', g: '삑!손 "트래블, {def}볼" 반대방향\n "사이드" 위치 손' },
        { area: '3번 구역 센터라인', res: '8초', g: '삑!손 "8초, {def}볼" 반대방향\n "사이드" 위치 손' },
        { area: '1번 구역 사이드라인', res: '{def} 아웃', g: '삑!손 "{off}볼" 공격방향\n "사이드" 위치 손' },
        { area: '6번 구역 사이드라인', res: '{off} 아웃', g: '삑!손 "{def}볼" 반대방향\n "사이드" 위치 손' }
    ]
};

let currentMode = 'LEAD';
let currentGuide = "";

// --- TTS 기능 추가 ---
function speak(text) {
    // 이전 음성이 재생 중이라면 중지
    window.speechSynthesis.cancel();

    // 텍스트에서 줄바꿈이나 특수 기호를 읽기 좋게 정제
    const cleanText = text.replace(/\n/g, " ").replace(/"/g, "");
    
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'ko-KR'; // 한국어 설정
    utterance.rate = 1.0;     // 속도 (0.1 ~ 10)
    utterance.pitch = 1.0;    // 음높이 (0 ~ 2)
    
    window.speechSynthesis.speak(utterance);
}

function updateBadge(id, teamName, prefix) {
    const el = document.getElementById(id);
    const colors = colorMap[teamName];
    el.innerText = `${teamName} ${prefix} `;
    el.style.backgroundColor = colors.bg;
    el.style.color = colors.text;
}

function generate() {
    document.getElementById('display-guide').innerText = "버튼을 눌러 확인하세요.";
    const q = quarters[Math.floor(Math.random() * quarters.length)];
    const isL = (currentMode === 'ALL') ? (Math.random() > 0.5) : (currentMode === 'LEAD');
    const c1 = Math.floor(Math.random() * teams.length);
    let c2 = (c1 + 1) % teams.length;
    const offT = teams[c1];
    const defT = teams[c2];
    const pNum = Math.floor(Math.random() * 98) + 1;
    const fType = fouls[Math.floor(Math.random() * fouls.length)];

    document.getElementById('info-pos').innerText = isL ? "리 드" : "트레일";
    updateBadge('info-off', offT, '🏀');
    updateBadge('info-def', defT, '');

    const pool = isL ? scenarios.LEAD : scenarios.TRAIL;
    const s = pool[Math.floor(Math.random() * pool.length)];

    let sitHtml = "";
    let speechText = ""; // 읽어줄 텍스트

    if (s.act) {
        sitHtml = `${s.area} <br>${offT} ${s.act}, ${defT}${pNum}번 ${fType}${s.res}`;
        speechText = `${s.area}, ${offT} ${s.act}, ${defT} ${pNum}번 ${fType} ${s.res}`;
    } else {
        const resClean = s.res.replace('{def}', defT).replace('{off}', offT);
        sitHtml = `${s.area} <br>${offT}볼, ${resClean}`;
        speechText = `${s.area}, ${offT}볼, ${resClean}`;
    }
    
    document.getElementById('display-situation').innerHTML = sitHtml;
    currentGuide = s.g.replace(/{def}/g, defT).replace(/{off}/g, offT).replace(/{num}/g, pNum).replace(/{foul}/g, fType);
    
    // 상황을 생성하자마자 읽어줌
    speak(speechText);
}

window.onload = function() {
    document.getElementById('btn-next').addEventListener('click', generate);
    document.getElementById('btn-guide').addEventListener('click', function() {
        document.getElementById('display-guide').innerText = currentGuide;
        // 대응 가이드를 읽어줌
        speak(currentGuide);
    });

    const modes = ['LEAD', 'TRAIL', 'ALL'];
    modes.forEach(m => {
        document.getElementById(`tab-${m}`).addEventListener('click', function() {
            currentMode = m;
            modes.forEach(id => document.getElementById(`tab-${id}`).classList.remove('active'));
            this.classList.add('active');
            generate();
        });
    });

    generate();
};
</script>

</body>
</html>
