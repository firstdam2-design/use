<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>🏀 농구 심판 연습 v0.51</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 0; background-color: #f2f2f2; display: flex; justify-content: center; padding: 0px; }
        .app-container { width: 100%; max-width: 800px; background: #ffffff; border: 1px solid #999; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: flex-end; padding: 15px 15px; border-bottom: 1px solid #eee; }
        .header h1 { margin: 0; font-size: 1.4rem; color: #333; }
        .tabs { display: flex; background: #e0e0e0; border-bottom: 1px solid #999; }
        .tab-btn { flex: 1; padding: 20px; border: 1px solid #bbb; background: #d0d0d0; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .tab-btn.active { background: #ffffff; border-bottom: none; border-top: 3px solid #333; color: #000; }
        .badge-row { display: flex; gap: 8px; padding: 20px 20px; background: #fff; flex-wrap: wrap; }
        .badge { padding: 6px 12px; font-weight: bold; font-size: 0.9rem; border-radius: 3px; border: 1px solid #ccc; }
        .bg-gray { background: #666; color: #fff; border: none; }
        .dynamic-badge { flex-grow: 1; text-align: center; border: 0.5px solid #000 }
        .content-box { display: grid; grid-template-columns: 80px 1fr; gap: 15px; padding: 20px; border-top: 1px solid #eee; min-height: 140px; }
        .text-display { font-size: 1.00rem; line-height: 1.6; font-weight: bold; color: #222; display: flex; align-items: center; }
        .guide-text { font-size: 1.00rem; color: #c0392b; white-space: pre-line; }
        .btn-wrap { display: flex; align-items: center; justify-content: center; }
        .push-btn { width: 100%; padding: 15px 5px; font-size: 1.05rem; font-weight: bold; border: 2px solid #333; background: #fff; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 0 #333; position: relative; top: 0; }
        .push-btn:active { top: 3px; box-shadow: 0 1px 0 #333; }
        .divider { height: 1px; background: #eee; margin: 0 20px; }
        #auto-toggle-btn:hover { filter: brightness(1.2); }
        #auto-toggle-btn:active { transform: scale(0.98); }
        @media (max-width: 500px) {
            .content-box { grid-template-columns: 60px 1fr; padding: 15px 15px; }
            .tab-btn { padding: 10px 5px; font-size: 0.8rem; }
        }
		#auto-toggle-btn {
    /* 기존 대비 120% 크기 및 가독성 강화 */
    width: 45%;             /* 화면 너비에 맞게 조정 */
    padding: 15px;          /* 높이감 대폭 상향 (기존 12~15px 대비) */
    font-size: 0.9rem;     /* 글자 크기 120% 확대 */
    
    /* 텍스트 스타일 */
    color: #ffffff !important; /* 텍스트 무조건 흰색 */
    font-weight: 500;       /* 아주 굵게(볼드) */
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3); /* 가독성을 위한 그림자 */

    /* 배경 및 테두리 */
    background: #2c3e50;    /* 기본 딥 네이비 (수동 상태) */
    border: none;
    border-radius: 15px;    /* 둥근 라운딩 적용 */
    
    /* 인터랙션 */
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

/* 자동 모드가 켜졌을 때 (JavaScript에서 배경색 제어와 함께 작동) */
#auto-toggle-btn.active-mode {
    background: #e74c3c;    /* 활성화 시 강렬한 레드 */
    transform: scale(1.02); /* 살짝 커지는 효과 */
}
#countdown { 
    /* 화면 정중앙에 고정 */
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    /* 디자인: 빨간색 대형 텍스트 */
    font-size: 10rem;     /* 더 압도적인 크기 */
    font-weight: 900; 
    color: rgba(57, 255, 20, 0.5); /* 약간 투명한 빨간색으로 가독성 확보 */
    
    /* 다른 요소보다 위에 표시 */
    z-index: 9999; 
    
    /* 클릭 방지 (숫자 뒤의 버튼을 누를 수 있게 함) */
    pointer-events: none; 
    
    /* 텍스트 그림자 */
    text-shadow: 4px 4px 15px rgba(0,0,0,0.3);
    
    /* 초기에는 안 보이게 설정 */
    display: none; 
}

/* --- 자바스크립트 수정본 --- */

let currentMode = 'LEAD';
let currentAnswer = "";
let isAuto = false;
let countInterval = null; // 카운트다운 인터벌 변수 추가

// 1. 핵심 TTS 함수 (카운트다운과 연동)
function speak(text, callback) {
    window.speechSynthesis.cancel(); 
    const utterance = new SpeechSynthesisUtterance(text.replace(/<br>/g, " "));
    utterance.lang = 'ko-KR';
    utterance.rate = 1.1;

    utterance.onend = function() {
        // 자동 모드일 때만 말이 끝나고 카운트다운 시작
        if (isAuto && typeof callback === 'function') {
            startCountdown(7, callback); 
        }
    };
    window.speechSynthesis.speak(utterance);
}

// 2. 카운트다운 시각화 함수
function startCountdown(seconds, callback) {
    if (!isAuto) return; 

    let timeLeft = seconds;
    const display = document.getElementById('countdown');
    
    if(countInterval) clearInterval(countInterval); 
    
    // 카운트다운 시작 시 화면에 표시
    if(display) {
        display.style.display = "flex"; 
        display.innerText = timeLeft; 
    }

    countInterval = setInterval(() => {
        if (!isAuto) {
            clearInterval(countInterval);
            if(display) display.style.display = "none";
            return;
        }

        timeLeft--;
        if (timeLeft > 0) {
            if(display) display.innerText = timeLeft;
        } else {
            clearInterval(countInterval);
            if(display) display.style.display = "none"; // 종료 시 숨김
            callback(); 
        }
    }, 1000);
}

// 3. 문제 생성 로직
function generateNewQuestion() {
    let actualMode = currentMode === 'ALL' ? (Math.random() > 0.5 ? 'LEAD' : 'TRAIL') : currentMode;
    const data = quizData[actualMode];
    const totalWeight = data.categories.reduce((sum, c) => sum + c.weight, 0);
    let random = Math.random() * totalWeight;
    
    let selectedItem = null;
    for (const cat of data.categories) {
        if (random < cat.weight) {
            selectedItem = cat.items[Math.floor(Math.random() * cat.items.length)];
            break;
        }
        random -= cat.weight;
    }

    document.getElementById('display-guide').innerText = "버튼을 눌러 확인하세요.";

    if (currentMode !== 'QUIZ') {
        const teamNames = Object.keys(colorMap).sort(() => Math.random() - 0.5);
        const offT = teamNames[0];
        const defT = teamNames[1];
        const randomNum = Math.floor(Math.random() * 99) + 1;

        document.getElementById('info-pos').innerText = actualMode === 'LEAD' ? "리 드" : "트레일";
        setBadge('info-off', offT, true);
        setBadge('info-def', defT, false);

        document.getElementById('display-situation').innerHTML = selectedItem.q.replace(/{off}/g, offT).replace(/{def}/g, defT).replace(/{num}/g, randomNum);
        currentAnswer = selectedItem.a.replace(/{off}/g, offT).replace(/{def}/g, defT).replace(/{num}/g, randomNum);
    } else {
        document.getElementById('display-situation').innerHTML = selectedItem.q;
        currentAnswer = selectedItem.a;
    }
}

// 4. 수동 조작 시 자동 모드 강제 해제
function handleManualQuestion() {
    stopAuto(); 
    generateNewQuestion();
    speak(document.getElementById('display-situation').innerText);
}

function handleManualAnswer() {
    stopAuto(); 
    document.getElementById('display-guide').innerHTML = currentAnswer;
    speak(document.getElementById('display-guide').innerText);
}

// 5. 자동 모드 흐름 제어
function runAutoFlow(step) {
    if (!isAuto) return;

    if (step === 'question') {
        generateNewQuestion();
        const text = document.getElementById('display-situation').innerText;
        speak(text, () => runAutoFlow('answer'));
    } else {
        document.getElementById('display-guide').innerHTML = currentAnswer;
        const text = document.getElementById('display-guide').innerText;
        speak(text, () => runAutoFlow('question'));
    }
}

function toggleAutoMode() {
    isAuto = !isAuto;
    const btn = document.getElementById('auto-toggle-btn');
    if (isAuto) {
        btn.innerText = "🛑 자동 모드 중지";
        btn.style.background = "#c0392b";
        runAutoFlow('question');
    } else {
        stopAuto();
    }
}

// 6. 모든 자동화 프로세스 중단 (초기화)
function stopAuto() {
    isAuto = false;
    if (countInterval) clearInterval(countInterval); 
    window.speechSynthesis.cancel(); 
    
    const display = document.getElementById('countdown');
    if (display) {
        display.innerText = "";
        display.style.display = "none"; // 화면에서 제거
    }
    
    const btn = document.getElementById('auto-toggle-btn');
    btn.innerText = "🔄 자동 모드 시작";
    btn.style.background = "#2c3e50";
}

// 7. 뱃지 및 모드 설정
function setBadge(id, teamName, isOffense = false) {
    const el = document.getElementById(id);
    const color = colorMap[teamName];
    if(!color) return;
    el.innerText = isOffense ? `${teamName} 🏀` : teamName;
    el.style.backgroundColor = color.bg;
    el.style.color = color.text;
}

function setMode(mode) {
    stopAuto();
    currentMode = mode;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.innerText === (mode === 'ALL' ? '2PO' : mode));
    });
    document.getElementById('badge-area').style.visibility = (mode === 'QUIZ') ? 'hidden' : 'visible';
    generateNewQuestion();
}

window.onload = () => generateNewQuestion();

</script>
